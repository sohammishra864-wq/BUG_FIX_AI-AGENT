###############################################################################
# cloudbuild.yaml — Deploy both MCP server and ADK agent to Cloud Run
# Usage: gcloud builds submit --config cloudbuild.yaml \
#          --substitutions=_REGION=us-central1,_GITHUB_SECRET=github-token,_GEMINI_SECRET=gemini-api-key
###############################################################################

substitutions:
  _REGION:         "us-central1"
  _GITHUB_SECRET:  "github-token"
  _GEMINI_SECRET:  "gemini-api-key"
  _REPO_PREFIX:    "${_REGION}-docker.pkg.dev/${PROJECT_ID}/bug-agent-repo"

steps:

  # ── 1. Create Artifact Registry repo (idempotent) ─────────────────────────
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "create-registry"
    entrypoint: bash
    args:
      - -c
      - |
        gcloud artifacts repositories describe bug-agent-repo \
          --location=${_REGION} --project=${PROJECT_ID} 2>/dev/null || \
        gcloud artifacts repositories create bug-agent-repo \
          --repository-format=docker \
          --location=${_REGION} \
          --project=${PROJECT_ID}

  # ── 2. Build MCP Server image ──────────────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: "build-mcp"
    waitFor: ["create-registry"]
    args:
      - build
      - -t
      - "${_REPO_PREFIX}/github-mcp_server:$SHORT_SHA"
      - -t
      - "${_REPO_PREFIX}/github-mcp_server:latest"
      - ./mcp_server

  # ── 3. Push MCP Server image ───────────────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: "push-mcp"
    waitFor: ["build-mcp"]
    args: ["push", "--all-tags", "${_REPO_PREFIX}/github-mcp_server"]

  # ── 4. Deploy MCP Server to Cloud Run ─────────────────────────────────────
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "deploy-mcp"
    waitFor: ["push-mcp"]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - github-mcp_server
      - --image=${_REPO_PREFIX}/github-mcp_server:$SHORT_SHA
      - --region=${_REGION}
      - --no-allow-unauthenticated
      - --set-secrets=GITHUB_TOKEN=${_GITHUB_SECRET}:latest
      - --memory=512Mi
      - --cpu=1
      - --min-instances=0
      - --max-instances=5

  # ── 5. Get MCP Server URL ──────────────────────────────────────────────────
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "get-mcp-url"
    waitFor: ["deploy-mcp"]
    entrypoint: bash
    args:
      - -c
      - |
        MCP_URL=$(gcloud run services describe github-mcp-server \
          --region=${_REGION} --format='value(status.url)')
        echo "$$MCP_URL/sse" > /workspace/mcp_url.txt
        echo "MCP Server URL: $$MCP_URL/sse"

  # ── 6. Build ADK Agent image ───────────────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: "build-agent"
    waitFor: ["get-mcp-url"]
    args:
      - build
      - -t
      - "${_REPO_PREFIX}/github-bug-agent:$SHORT_SHA"
      - -t
      - "${_REPO_PREFIX}/github-bug-agent:latest"
      - ./adk_agent

  # ── 7. Push ADK Agent image ────────────────────────────────────────────────
  - name: "gcr.io/cloud-builders/docker"
    id: "push-agent"
    waitFor: ["build-agent"]
    args: ["push", "--all-tags", "${_REPO_PREFIX}/github-bug-agent"]

  # ── 8. Deploy ADK Agent to Cloud Run ──────────────────────────────────────
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "deploy-agent"
    waitFor: ["push-agent"]
    entrypoint: bash
    args:
      - -c
      - |
        MCP_URL=$(cat /workspace/mcp_url.txt)
        gcloud run deploy github-bug-agent \
          --image=${_REPO_PREFIX}/github-bug-agent:$SHORT_SHA \
          --region=${_REGION} \
          --allow-unauthenticated \
          --set-secrets=GOOGLE_API_KEY=${_GEMINI_SECRET}:latest \
          --set-env-vars=MCP_SERVER_URL=$$MCP_URL \
          --memory=1Gi \
          --cpu=1 \
          --min-instances=0 \
          --max-instances=5

  # ── 9. Set IAM: agent → can invoke MCP server ─────────────────────────────
  - name: "gcr.io/google.com/cloudsdktool/cloud-sdk"
    id: "set-iam"
    waitFor: ["deploy-agent"]
    entrypoint: bash
    args:
      - -c
      - |
        AGENT_SA=$(gcloud run services describe github-bug-agent \
          --region=${_REGION} --format='value(spec.template.spec.serviceAccountName)')
        gcloud run services add-iam-policy-binding github-mcp-server \
          --region=${_REGION} \
          --member="serviceAccount:$$AGENT_SA" \
          --role="roles/run.invoker"
        AGENT_URL=$(gcloud run services describe github-bug-agent \
          --region=${_REGION} --format='value(status.url)')
        echo ""
        echo "============================================"
        echo "Deployment complete!"
        echo " Agent URL (submit this): $$AGENT_URL"
        echo "============================================"

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
